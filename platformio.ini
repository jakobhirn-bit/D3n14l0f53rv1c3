; PlatformIO Project Configuration File
;
; USB Army Knife - German Keyboard Layout Fork
; Original: https://github.com/i-am-shodan/USBArmyKnife
;
; Changes in this fork:
; - Enabled LOCALE_win_de_DE for German keyboard support
; - Disabled LOCALE_win_en_GB

[env:tdongle-s3]
platform = espressif32
board = lilygo-t-dongle-s3
framework = arduino
board_build.partitions = huge_app.csv
build_flags =
	-D ARDUINO_USB_CDC_ON_BOOT=1
	;-D DEBUG
	;-D NO_SD_CARD
	;-D NO_SCREEN
	;-D NO_LED
	;-D NO_MARAUDER
	;-D NO_BT
	;-D NO_HID
	;-D NO_ETH
	;-D NO_WIFICON
	-D NO_AGENT
	;-D FACTORY_TEST
	;-D NO_WIFI
	;-D USB_ETH
	;-D USB_MSC
	;-D USB_HID
	;-D USB_VSER
	;-D TDECK
	; Keyboard layouts - only enable ONE at a time
	; -D LOCALE_win_en_US
	; -D LOCALE_win_en_GB
	; -D LOCALE_win_es
	; -D LOCALE_win_fr
	; -D LOCALE_win_de
	-D LOCALE_win_de_DE
	; -D LOCALE_win_it
	; -D LOCALE_win_pt_BR
lib_deps =
	https://github.com/i-am-shodan/USBArmyKnife.git#master
lib_archive = no
monitor_speed = 115200
